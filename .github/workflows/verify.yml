name: Verify Benchmark

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Pokemon Showdown
        run: pnpm run build:showdown

      - name: Verify benchmark bundle
        run: |
          node --check src/cli.js
          node --check src/live-results.js
          node --check src/showdown/live-ladder.js
          node --check src/readiness.js
          node test/openai-agent.mjs
          node test/smoke.mjs
          node test/live-ladder-mock.mjs
          node scripts/check-site.mjs
