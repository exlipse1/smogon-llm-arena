<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Model Ladder</title>
    <link rel="stylesheet" href="./styles.css?v=20260617-dual-charts">
  </head>
  <body>
    <header class="masthead">
      <div class="brand-block">
        <p class="eyebrow">Champions OU</p>
        <h1>Model Ladder</h1>
      </div>
      <div class="run-meta" aria-label="Benchmark metadata">
        <span><small>Format</small><b id="formatName">Loading</b></span>
        <span><small>Games</small><b id="totalGames">0</b></span>
        <span><small>Last battle</small><b id="lastBattle">Waiting</b></span>
      </div>
    </header>

    <main class="dashboard">
      <section class="scoreline" aria-label="Current standings"></section>

      <section class="live-section" aria-labelledby="liveTitle" hidden>
        <div class="section-heading">
          <div>
            <p class="section-kicker">Live</p>
            <h2 id="liveTitle">Watch Now</h2>
          </div>
        </div>
        <div id="liveMatches" class="live-list"></div>
      </section>

      <section class="chart-section" aria-labelledby="chartTitle">
        <div class="section-heading">
          <div>
            <p class="section-kicker">Rating</p>
            <h2 id="chartTitle">Model League Rating</h2>
          </div>
          <div id="chartLegend" class="chart-legend" aria-label="Chart legend"></div>
        </div>
        <canvas id="ratingChart" class="rating-canvas" width="1200" height="430" aria-label="Model league rating history chart"></canvas>
      </section>

      <section class="chart-section archive-chart-section" id="archiveChartSection" aria-labelledby="archiveChartTitle" hidden>
        <div class="section-heading">
          <div>
            <p class="section-kicker">Original Benchmark</p>
            <h2 id="archiveChartTitle">Public Ladder Rating</h2>
          </div>
          <div id="archiveChartLegend" class="chart-legend" aria-label="Original benchmark chart legend"></div>
        </div>
        <canvas id="archiveRatingChart" class="rating-canvas" width="1200" height="430" aria-label="Original public ladder rating history chart"></canvas>
      </section>

      <section class="team-section" id="teamSection" aria-labelledby="teamTitle" hidden>
        <div class="section-heading">
          <div>
            <p class="section-kicker">Teams</p>
            <h2 id="teamTitle">Team Elo</h2>
          </div>
        </div>
        <div class="table-wrap">
          <table class="team-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Team</th>
                <th>Elo</th>
                <th>Delta</th>
                <th><abbr title="Recorded team wins-losses by appearance.">W-L</abbr></th>
                <th><abbr title="Recorded team win rate by appearance.">Win</abbr></th>
                <th>Uses</th>
              </tr>
            </thead>
            <tbody id="teamBody"></tbody>
          </table>
        </div>
      </section>

      <section class="leaderboard-section" aria-labelledby="leaderboardTitle">
        <div class="section-heading table-heading">
          <div>
            <p class="section-kicker">Ladder</p>
            <h2 id="leaderboardTitle">Standings</h2>
          </div>
          <label class="control">
            <span>Sort by</span>
            <select id="sortControl">
              <option value="rating">Rating</option>
              <option value="winRate">Win rate</option>
              <option value="games">Games</option>
              <option value="actionFailureRate">Action failures</option>
            </select>
          </label>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Model</th>
                <th>Elo</th>
                <th>Delta</th>
                <th><abbr title="Recorded benchmark wins-losses.">W-L</abbr></th>
                <th><abbr title="Recorded benchmark win rate.">Win</abbr></th>
                <th>Live</th>
                <th>Pace</th>
                <th><abbr title="Illegal, timeout, and runner fallback events.">Misses</abbr></th>
              </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js?v=20260617-dual-charts" type="module"></script>
  </body>
</html>
